<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechFusion Studio</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header js-header">
        <div class="container header__container">
            <a href="#" class="header__logo">TechFusion</a>
            
            <button class="header__toggle js-header__toggle" aria-label="Toggle navigation">
                <span class="header__toggle-bar"></span>
                <span class="header__toggle-bar"></span>
                <span class="header__toggle-bar"></span>
            </button>

            <nav class="header__nav js-header__nav">
                <ul class="header__list">
                    <li class="header__item"><a href="#hero" class="header__link js-scroll-link">首頁</a></li>
                    <li class="header__item"><a href="#services" class="header__link js-scroll-link">服務項目</a></li>
                    <li class="header__item"><a href="team.html" class="header__link">技術團隊</a></li>
                    <li class="header__item"><a href="#contact" class="header__link js-scroll-link btn btn--primary btn--small">聯絡我們</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section id="hero" class="hero">
        <div class="container hero__container">
            <div class="hero__content">
                <h1 class="hero__title">用程式碼，將創意轉化為無限可能</h1>
                <p class="hero__subtitle">我們是 TechFusion，專注於前端互動與後端系統整合的頂尖團隊。正在尋找志同道合的你加入。</p>
                <div class="hero__actions">
                    <a href="#services" class="btn btn--primary btn--large js-scroll-link">探索服務</a>
                    <a href="#contact" class="btn btn--secondary btn--large js-scroll-link">加入我們</a>
                </div>
            </div>
        </div>
    </section>

    <section id="services" class="services section-padding">
        <div class="container">
            <h2 class="section-title">我們的核心服務</h2>
            <div class="services__grid">
                
                <div class="service-card">
                    <div class="service-card__icon">
                        <i class="fa-solid fa-laptop-code fa-3x" style="color: #3b82f6; margin-bottom: 20px; display: block;"></i> 
                    </div>
                    <h3 class="service-card__title">UI/UX 網頁切版</h3>
                    <p class="service-card__text">精準還原設計稿，注重 RWD 響應式體驗與跨瀏覽器相容性。</p>
                </div>

                <div class="service-card">
                    <div class="service-card__icon">
                    <i class="fa-solid fa-mouse-pointer fa-3x" style="color: #3b82f6; margin-bottom: 20px; display: block;"></i>
                    </div>
                    <h3 class="service-card__title">前端互動開發</h3>
                    <p class="service-card__text">運用 JavaScript/jQuery 打造流暢的使用者互動與動態特效。</p>
                </div>

                <div class="service-card">
                    <div class="service-card__icon">
                        <i class="fa-solid fa-database fa-3x" style="color: #3b82f6; margin-bottom: 20px; display: block;"></i>
                    </div>
                    <h3 class="service-card__title">後端系統串接</h3>
                    <p class="service-card__text">提供高品質的版型程式碼，確保與後端 API 完美對接。</p>
                </div>

            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p class="footer__text">&copy; 2026 TechFusion Studio.</p>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
