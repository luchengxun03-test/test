<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技術團隊 | TechFusion Studio</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* 專屬於 team.html 的特定樣式 */
        .team-hero {
            padding: 150px 0 80px; /* 留出 header 空間 */
            background-color: var(--secondary-color);
            color: var(--white);
            text-align: center;
        }
        
        .team__grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }
        
        .member-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: var(--transition);
            border: 1px solid #e2e8f0;
            text-align: center;
        }
        
        .member-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .member-card__img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin: 40px auto 20px;
            border: 4px solid #e2e8f0;
        }
        
        .member-card__info {
            padding: 0 30px 40px;
        }
        
        .member-card__name {
            font-size: 1.4rem;
            color: var(--secondary-color);
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .member-card__title {
            font-size: 1rem;
            color: var(--primary-color);
            font-weight: 500;
            margin-bottom: 20px;
            display: block;
        }
        
        .member-card__text {
            font-size: 0.95rem;
            color: var(--text-color);
            opacity: 0.8;
            margin-bottom: 20px;
        }
        
        .member-card__socials {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 1.2rem;
            color: #94a3b8;
        }
        
        .member-card__socials a:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <header class="header js-header header--scrolled"> <div class="container header__container">
            <a href="index.html" class="header__logo">TechFusion</a>
            
            <nav class="header__nav js-header__nav">
                <ul class="header__list">
                    <li class="header__item"><a href="index.html" class="header__link">首頁</a></li>
                    <li class="header__item"><a href="index.html#services" class="header__link">服務項目</a></li>
                    <li class="header__item"><a href="team.html" class="header__link active">技術團隊</a></li>
                    <li class="header__item"><a href="contact.html" class="header__link">聯絡我們</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="team-hero">
        <div class="container">
            <h1 class="hero__title">認識我們的技術專家</h1>
            <p class="hero__subtitle">由一塊一塊程式碼築起的堅強團隊。</p>
        </div>
    </section>

    <section class="team section-padding">
        <div class="container">
            <div class="team__grid">
                
                <div class="member-card">
                    <img src="" alt="" class="member-card__img">
                    <div class="member-card__info">
                        <h3 class="member-card__name">Peter</h3>
                        <span class="member-card__title">前端互動開發組長</span>
                        <p class="member-card__text">精通 JavaScript / jQuery 互動邏輯，致力於打造極致的使用者體驗與 RWD 排版。</p>
                        <div class="member-card__socials">
                            <a href="#" aria-label="Github"><i class="fa-brands fa-github"></i></a>
                            <a href="#" aria-label="Linkedin"><i class="fa-brands fa-linkedin"></i></a>
                        </div>
                    </div>
                </div>

                <div class="member-card">
                    <img src="" alt="" class="member-card__img">
                    <div class="member-card__info">
                        <h3 class="member-card__name">Anna</h3>
                        <span class="member-card__title">UI/UX 網頁設計師</span>
                        <p class="member-card__text">專注於跨裝置介面設計，確保設計稿完美對接前端切版需求。</p>
                        <div class="member-card__socials">
                            <a href="#" aria-label="Github"><i class="fa-brands fa-github"></i></a>
                            <a href="#" aria-label="Linkedin"><i class="fa-brands fa-linkedin"></i></a>
                        </div>
                    </div>
                </div>

                <div class="member-card">
                    <img src="" alt="" class="member-card__img">
                    <div class="member-card__info">
                        <h3 class="member-card__name">David</h3>
                        <span class="member-card__title">後端系統工程師</span>
                        <p class="member-card__text">負責 API 設計與資料庫優化，提供高品質的程式碼供前端串接。</p>
                        <div class="member-card__socials">
                            <a href="#" aria-label="Github"><i class="fa-brands fa-github"></i></a>
                            <a href="#" aria-label="Linkedin"><i class="fa-brands fa-linkedin"></i></a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p class="footer__text">&copy; 2026 TechFusion Studio.</p>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
